server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Health probe — proxies to gateway so the probe fails if backend is unreachable
    location = /healthz {
        proxy_pass ${GATEWAY_API_URL}/api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        # Use gateway's hostname for ACA virtual-host routing
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        # Safety nets: rewrite any absolute Location header back to relative
        proxy_redirect ${GATEWAY_API_URL}/ /;
        proxy_redirect ~^https?://[^/]+/ /;
        # Probe-specific: fail fast instead of the 3600s used for /api/
        proxy_connect_timeout 2s;
        proxy_send_timeout 2s;
        proxy_read_timeout 2s;
        access_log off;
    }

    # Runtime-inject GATEWAY_API_URL without a rebuild
    location = /config.js {
        add_header Content-Type "application/javascript";
        add_header Cache-Control "no-store";
        return 200 "window.GATEWAY_API_URL=undefined;";
    }

    # Proxy /api/* to gateway — no CORS needed, same origin for the browser
    location /api/ {
        proxy_pass ${GATEWAY_API_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
        # Use gateway's hostname for ACA virtual-host routing
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        # Safety nets: rewrite any absolute Location header back to relative
        proxy_redirect ${GATEWAY_API_URL}/ /;
        proxy_redirect ~^https?://[^/]+/ /;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
